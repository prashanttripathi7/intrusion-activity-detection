<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time IDS Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-shell">
        <header class="hero">
            <div>
                <p class="eyebrow">Intrusion Activity Detection & Attack Trace System</p>
                <h1>Real-Time IDS Dashboard</h1>
                <p class="hero-copy">Monitor logs, detect OWASP attacks, correlate incident chains, and export a PDF report from one screen.</p>
            </div>
            <div class="hero-actions">
                <select id="scanModeSelect" class="mode-select">
                    <option value="live">Live Monitoring</option>
                    <option value="historical">Historical Scan</option>
                </select>
                <button id="startBtn" class="btn btn-primary">Start Monitoring</button>
                <button id="stopBtn" class="btn btn-danger">Stop Monitoring</button>
                <button id="downloadBtn" class="btn btn-secondary">Download Report</button>
            </div>
        </header>

        <section class="status-bar">
            <div class="status-card">
                <span class="status-label">Monitoring</span>
                <strong id="monitoringStatus">Stopped</strong>
            </div>
            <div class="status-card">
                <span class="status-label">Total Alerts</span>
                <strong id="alertCount">0</strong>
            </div>
            <div class="status-card">
                <span class="status-label">Attack Chains</span>
                <strong id="chainCount">0</strong>
            </div>
            <div class="status-card">
                <span class="status-label">Scan Mode</span>
                <strong id="scanModeStatus">Live</strong>
            </div>
        </section>

        <section class="panel-grid">
            <article class="panel">
                <div class="panel-header">
                    <h2>Live Logs</h2>
                    <input id="logSearch" type="text" placeholder="Search logs">
                </div>
                <div id="logsContainer" class="scroll-panel"></div>
            </article>

            <article class="panel">
                <div class="panel-header">
                    <h2>Alerts</h2>
                    <select id="severityFilter">
                        <option value="ALL">All Severity</option>
                        <option value="High">High</option>
                        <option value="Medium">Medium</option>
                        <option value="Low">Low</option>
                    </select>
                </div>
                <div id="alertsContainer" class="scroll-panel"></div>
            </article>
        </section>

        <section class="panel-grid bottom-grid">
            <article class="panel">
                <div class="panel-header">
                    <h2>Timeline</h2>
                </div>
                <div id="timelineContainer" class="scroll-panel"></div>
            </article>

            <article class="panel">
                <div class="panel-header">
                    <h2>Attack Chains</h2>
                </div>
                <div id="chainsContainer" class="scroll-panel"></div>
            </article>
        </section>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
